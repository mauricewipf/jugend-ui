<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 11.5">
  <defs>
    <g id="flake" fill="none" stroke="#34597D" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">
      <g id="flake-arm">
        <path d="m0 0v-7.6"/>
        <path d="m0-4.2-1.8-1.9m1.8 1.9 1.8-1.9"/>
        <path d="m0-6.5-1.1-1.3m1.1 1.3 1.1-1.3"/>
      </g>
      <use href="#flake-arm" transform="rotate(60)"/>
      <use href="#flake-arm" transform="rotate(120)"/>
      <use href="#flake-arm" transform="rotate(180)"/>
      <use href="#flake-arm" transform="rotate(240)"/>
      <use href="#flake-arm" transform="rotate(300)"/>
      <circle r="1.4" fill="#F2F8FC" stroke="#1F3A56" stroke-width="0.5"/>
    </g>
    <g id="flake-small" fill="none" stroke="#7BA7CC" stroke-width="0.55" stroke-linecap="round">
      <path d="m0-3.4v6.8m-2.9-5.1 5.8 3.4m0-3.4-5.8 3.4"/>
      <circle r="0.7" fill="#A9CDE8" stroke="#34597D" stroke-width="0.35"/>
    </g>
    <g id="half">
      <!-- main whiplash vine -->
      <path d="M157 5.75 C 167 2.4, 178 9.1, 190 5.75 S 213 2.4, 224 5.75 S 247 9.1, 258 5.75 C 264.5 3.8, 271 3.3, 276.5 4.6" fill="none" stroke="#34597D" stroke-width="0.7" stroke-linecap="round"/>
      <!-- echo line in light blue -->
      <path d="M158 6.9 C 168 4.1, 179 10.2, 190 7.1 S 213 3.7, 224 6.9 S 246 10.2, 257 7.1" fill="none" stroke="#A9CDE8" stroke-width="0.45" stroke-linecap="round"/>
      <!-- end spiral curl -->
      <path d="M276.5 4.6 C 282 6.0, 286.6 5.2, 287.9 3.2 C 288.7 1.9, 288 0.9, 286.6 0.9 C 285.2 0.9, 284.7 2.1, 285.5 2.8 C 286.1 3.3, 286.9 3.0, 287 2.4" fill="none" stroke="#1F3A56" stroke-width="0.6" stroke-linecap="round"/>
      <path d="M276 6.4 c 4.5 2.4, 9 3.2, 13.2 2.3" fill="none" stroke="#7BA7CC" stroke-width="0.55" stroke-linecap="round"/>
      <circle cx="291.5" cy="8.3" r="0.8" fill="#A9CDE8" stroke="#34597D" stroke-width="0.35"/>
      <!-- small snowflakes along the vine -->
      <use href="#flake-small" transform="translate(173.5 3.1) rotate(12) scale(0.8)"/>
      <use href="#flake-small" transform="translate(207 8.5) rotate(-18) scale(0.8)"/>
      <use href="#flake-small" transform="translate(240.5 3.1) rotate(25) scale(0.8)"/>
      <!-- drifting snow dots -->
      <circle cx="190" cy="5.75" r="0.55" fill="#A9CDE8"/>
      <circle cx="224" cy="5.75" r="0.55" fill="#A9CDE8"/>
      <circle cx="258" cy="5.75" r="0.55" fill="#A9CDE8"/>
      <circle cx="182" cy="9.4" r="0.4" fill="#7BA7CC"/>
      <circle cx="216" cy="2.1" r="0.4" fill="#7BA7CC"/>
      <circle cx="249.5" cy="9.4" r="0.4" fill="#7BA7CC"/>
      <circle cx="268" cy="2.3" r="0.4" fill="#A9CDE8"/>
    </g>
  </defs>
  <!-- left half mirrored from right half -->
  <use href="#half" transform="translate(300 0) scale(-1 1)"/>
  <use href="#half"/>
  <!-- center snowflake -->
  <use href="#flake" transform="translate(150 5.75) scale(0.58)"/>
</svg>
