<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 141 211">
  <!-- Jugendstil winter skeleton frame. Slice-safe for border-image-slice 50/56:
       corners carry the ornament (frost tendrils, snowflakes, icicles, drifts),
       edge strips contain only straight rails,
       center zone (56..85 x 50..161) is flat #E2EEF7. -->
  <style type="text/css">
    .i{fill:#7BA7CC;stroke:#1F3A56;stroke-width:.45;stroke-linecap:round;stroke-linejoin:round}
    .lb{fill:#A9CDE8;stroke:#1F3A56;stroke-width:.4;stroke-linecap:round;stroke-linejoin:round}
    .t{fill:none;stroke:#34597D;stroke-width:.6;stroke-linecap:round}
    .s{fill:#F2F8FC;stroke:#1F3A56;stroke-width:.4;stroke-linecap:round;stroke-linejoin:round}
    .p{fill:#A9CDE8;stroke:#1F3A56;stroke-width:.35}
  </style>

  <!-- ground -->
  <rect width="141" height="211" fill="#F2F8FC"/>

  <!-- mid hairline (under the corner ornament) -->
  <rect x="29.5" y="26.5" width="82" height="158" fill="none" stroke="#A9CDE8" stroke-width=".5"/>

  <!-- outer fine rule -->
  <rect x="2.5" y="2.5" width="136" height="206" fill="none" stroke="#1F3A56" stroke-width=".75"/>

  <!-- ice-blue band -->
  <path d="M5 5H136V206H5ZM9 9V202H132V9Z" fill="#7BA7CC" fill-rule="evenodd" stroke="#1F3A56" stroke-width=".5"/>

  <!-- pale pinstripe inside the band -->
  <rect x="10.75" y="10.75" width="119.5" height="189.5" fill="none" stroke="#A9CDE8" stroke-width=".6"/>

  <!-- inner rule + flat frost centre -->
  <rect x="50" y="44" width="41" height="123" fill="#E2EEF7" stroke="#1F3A56" stroke-width=".75"/>
  <rect x="52.5" y="46.5" width="36" height="118" fill="none" stroke="#34597D" stroke-width=".5"/>

  <defs>
    <!-- six-armed snowflake (same construction as card-frame) -->
    <g id="flake" fill="none" stroke="#34597D" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">
      <g id="flake-arm">
        <path d="m0 0v-7.6"/>
        <path d="m0-4.2-1.8-1.9m1.8 1.9 1.8-1.9"/>
        <path d="m0-6.5-1.1-1.3m1.1 1.3 1.1-1.3"/>
      </g>
      <use href="#flake-arm" xlink:href="#flake-arm" transform="rotate(60)"/>
      <use href="#flake-arm" xlink:href="#flake-arm" transform="rotate(120)"/>
      <use href="#flake-arm" xlink:href="#flake-arm" transform="rotate(180)"/>
      <use href="#flake-arm" xlink:href="#flake-arm" transform="rotate(240)"/>
      <use href="#flake-arm" xlink:href="#flake-arm" transform="rotate(300)"/>
      <circle r="1.4" fill="#F2F8FC" stroke="#1F3A56" stroke-width="0.5"/>
    </g>
    <g id="flake-small" fill="none" stroke="#7BA7CC" stroke-width="0.55" stroke-linecap="round">
      <path d="m0-3.4v6.8m-2.9-5.1 5.8 3.4m0-3.4-5.8 3.4"/>
      <circle r="0.7" fill="#A9CDE8" stroke="#34597D" stroke-width="0.35"/>
    </g>

    <!-- corner ornament master (drawn for top-left) -->
    <g id="c">
      <!-- band corner swell -->
      <path class="lb" d="M5 16C5 9.2 9.2 5 16 5L12.2 5C8.2 5 5 8.2 5 12.2Z"/>
      <!-- tapered frost-tendril whiplash -->
      <path class="i" d="M11.5 11C26 11.5 38 16 44.5 26C48.5 32.5 47.5 40 41.5 45.5C39.5 47.2 36.8 47.8 35 47.2C37.5 46.2 40 45 41.8 43C45.5 38.8 46 33 42.8 27.5C36.8 18 25 13.6 11 13.2Z"/>
      <!-- trailing tendril spiral -->
      <path class="t" d="M35 47.2C31.8 47.6 29.8 45.8 30.3 43.6C30.7 41.9 32.6 41.4 33.6 42.5C34.3 43.3 33.9 44.5 32.8 44.5"/>
      <!-- secondary frost curl -->
      <path class="t" d="M27 13.8C33 11.5 39 11.8 43.5 14.8C45.6 16.2 45.9 18.6 44.3 19.9C43 20.9 41.3 20.4 41 19C40.8 17.9 41.8 17.2 42.6 17.7"/>
      <!-- snowflakes -->
      <use href="#flake" xlink:href="#flake" transform="translate(21 26) scale(1.15)"/>
      <use href="#flake-small" xlink:href="#flake-small" transform="translate(37 33.5) rotate(20)"/>
      <!-- frozen pearls -->
      <circle class="p" cx="47" cy="22.5" r="1.5"/>
      <circle class="p" cx="50.2" cy="25.8" r="1.1"/>
      <circle class="p" cx="44.6" cy="25.4" r="0.9"/>
      <!-- tiny flake jewel on the inner-rule corner -->
      <use href="#flake-small" xlink:href="#flake-small" transform="translate(50 44) scale(.85) rotate(10)"/>
    </g>

    <!-- icicles hanging from the band (top corners only) -->
    <g id="ice">
      <path class="s" d="M13.4 9.2l1.1 7 1.1-7zm4.6 0l1.3 10.2 1.3-10.2zm5.4 0l1.1 5.8 1.1-5.8zm4.6 0l1.2 8.4 1.2-8.4zm5 0l1 5 1-5z"/>
    </g>

    <!-- snow drift resting on the band (bottom corners only) -->
    <g id="drift">
      <path class="s" d="M12 202C15.5 196.8 21 195.2 25.5 197.4C29.5 199.2 34 200.8 38.5 202Z"/>
      <path class="s" d="M24 202C26.5 198.8 30.5 198.2 33.5 200C35 200.9 36.7 201.6 38.5 202Z" stroke-width=".35"/>
    </g>
  </defs>

  <!-- corner ornament, mirrored to all corners -->
  <use href="#c" xlink:href="#c" transform="translate(141 0) scale(-1 1)"/>
  <use href="#c" xlink:href="#c" transform="translate(0 211) scale(1 -1)"/>
  <use href="#c" xlink:href="#c" transform="translate(141 211) scale(-1 -1)"/>
  <use href="#c" xlink:href="#c"/>

  <!-- gravity-aware extras: icicles up top, drifts below -->
  <use href="#ice" xlink:href="#ice"/>
  <use href="#ice" xlink:href="#ice" transform="translate(141 0) scale(-1 1)"/>
  <use href="#drift" xlink:href="#drift"/>
  <use href="#drift" xlink:href="#drift" transform="translate(141 0) scale(-1 1)"/>
</svg>
