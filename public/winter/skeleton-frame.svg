<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 141 211">
  <!-- Jugendstil autumn skeleton frame. Slice-safe for border-image-slice 50/56:
       corners carry the ornament, edge strips contain only straight rails,
       center zone (56..85 x 50..161) is flat #E8DCC8. -->
  <style type="text/css">
    .g{fill:#AE8746;stroke:#473418;stroke-width:.45;stroke-linecap:round;stroke-linejoin:round}
    .lg{fill:#C99D57;stroke:#473418;stroke-width:.4;stroke-linecap:round;stroke-linejoin:round}
    .v{fill:none;stroke:#C99D57;stroke-width:.55;stroke-linecap:round}
    .t{fill:none;stroke:#684F28;stroke-width:.6;stroke-linecap:round}
    .b{fill:#684F28}
  </style>

  <!-- ground -->
  <rect width="141" height="211" fill="#FBF3E3"/>

  <!-- mid hairline (under the corner ornament) -->
  <rect x="29.5" y="26.5" width="82" height="158" fill="none" stroke="#C99D57" stroke-width=".5"/>

  <!-- outer fine rule -->
  <rect x="2.5" y="2.5" width="136" height="206" fill="none" stroke="#473418" stroke-width=".75"/>

  <!-- gold band -->
  <path d="M5 5H136V206H5ZM9 9V202H132V9Z" fill="#AE8746" fill-rule="evenodd" stroke="#473418" stroke-width=".5"/>

  <!-- light-gold pinstripe inside the band -->
  <rect x="10.75" y="10.75" width="119.5" height="189.5" fill="none" stroke="#C99D57" stroke-width=".6"/>

  <!-- inner rule + flat parchment centre -->
  <rect x="50" y="44" width="41" height="123" fill="#E8DCC8" stroke="#473418" stroke-width=".75"/>
  <rect x="52.5" y="46.5" width="36" height="118" fill="none" stroke="#684F28" stroke-width=".5"/>

  <!-- corner ornament (top-left master, mirrored to the other corners) -->
  <g id="c">
    <!-- band corner swell -->
    <path class="lg" d="M5 16C5 9.2 9.2 5 16 5L12.2 5C8.2 5 5 8.2 5 12.2Z"/>
    <!-- tapered whiplash stem -->
    <path class="g" d="M11.5 11C27 12.5 40 18 45.8 29C48.6 34.6 48 40.6 43.6 45C41.8 46.7 39.3 47.6 37.2 47.2C39 46.4 41 45.4 42.5 43.9C46.3 40 46.8 35 44.3 30C38.9 19.6 26.5 14.4 11 13.3Z"/>
    <!-- trailing tendril spiral -->
    <path class="t" d="M37.2 47.2C33.8 47.4 31.8 45.6 32.2 43.5C32.5 41.8 34.4 41.2 35.5 42.3C36.3 43.1 35.9 44.4 34.8 44.4"/>
    <!-- large autumn leaf -->
    <path class="g" d="M24 15.5C31.5 16.5 36 22 35.2 31C30 29.5 26 24.5 24 15.5Z"/>
    <path class="v" d="M25.8 17.5C29.5 21.5 32.5 25.5 34.3 29.5"/>
    <!-- small leaf -->
    <path class="g" d="M14.5 14.5C19.5 16.5 22 21 21 26.5C16.8 24 14.6 19.6 14.5 14.5Z"/>
    <path class="v" d="M15.9 16.6C18 19.4 19.6 22.3 20.3 25"/>
    <!-- berries -->
    <circle class="b" cx="43" cy="16.5" r="1.7"/>
    <circle class="b" cx="46.6" cy="19.8" r="1.3"/>
    <circle class="b" cx="40.2" cy="19.6" r="1.1"/>
    <!-- jewel on the inner-rule corner -->
    <circle class="g" cx="50" cy="44" r="1.7"/>
  </g>
  <use href="#c" xlink:href="#c" transform="translate(141 0) scale(-1 1)"/>
  <use href="#c" xlink:href="#c" transform="translate(0 211) scale(1 -1)"/>
  <use href="#c" xlink:href="#c" transform="translate(141 211) scale(-1 -1)"/>
</svg>
