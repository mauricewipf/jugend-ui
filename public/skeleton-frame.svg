<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="skeletonFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBF3E3"/>
      <stop offset="50%" stop-color="#F5ECD8"/>
      <stop offset="100%" stop-color="#E8DFC8"/>
    </linearGradient>
    <linearGradient id="shimmerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  
  <!-- Main skeleton container with Art Nouveau corners -->
  <rect x="10" y="10" width="180" height="100" fill="url(#skeletonFill)" stroke="#473418" stroke-width="1" rx="2"/>
  
  <!-- Top-left decorative corner: whiplash tendril -->
  <path fill="none" stroke="#AE8746" stroke-width="1.2" stroke-linecap="round" d="M10 25 Q18 18 25 22 Q20 28 12 28"/>
  <path fill="none" stroke="#C99D57" stroke-width="0.8" stroke-linecap="round" d="M18 14 Q26 10 28 18"/>
  <circle cx="14" cy="16" r="2" fill="#C99D57" opacity="0.6"/>
  
  <!-- Top-right decorative corner -->
  <path fill="none" stroke="#AE8746" stroke-width="1.2" stroke-linecap="round" d="M190 25 Q182 18 175 22 Q180 28 188 28"/>
  <path fill="none" stroke="#C99D57" stroke-width="0.8" stroke-linecap="round" d="M182 14 Q174 10 172 18"/>
  <circle cx="186" cy="16" r="2" fill="#C99D57" opacity="0.6"/>
  
  <!-- Bottom-left decorative corner: floral flourish -->
  <path fill="none" stroke="#AE8746" stroke-width="1.2" stroke-linecap="round" d="M10 95 Q18 102 12 108 Q20 110 28 98"/>
  <path fill="none" stroke="#C99D57" stroke-width="0.8" stroke-linecap="round" d="M16 100 Q20 106 14 112"/>
  <ellipse cx="16" cy="104" rx="3" ry="2" fill="#C99D57" opacity="0.5" transform="rotate(-30 16 104)"/>
  
  <!-- Bottom-right decorative corner -->
  <path fill="none" stroke="#AE8746" stroke-width="1.2" stroke-linecap="round" d="M190 95 Q182 102 188 108 Q180 110 172 98"/>
  <path fill="none" stroke="#C99D57" stroke-width="0.8" stroke-linecap="round" d="M184 100 Q180 106 186 112"/>
  <ellipse cx="184" cy="104" rx="3" ry="2" fill="#C99D57" opacity="0.5" transform="rotate(30 184 104)"/>
  
  <!-- Top center scroll ornament -->
  <path fill="none" stroke="#B8B994" stroke-width="0.8" stroke-linecap="round" d="M90 10 Q100 6 110 10 Q100 14 90 10"/>
  
  <!-- Bottom center scroll ornament -->
  <path fill="none" stroke="#B8B994" stroke-width="0.8" stroke-linecap="round" d="M90 110 Q100 114 110 110 Q100 106 90 110"/>
  
  <!-- Inner content lines representing skeleton text blocks -->
  <rect x="25" y="25" width="150" height="8" fill="#D4C9B0" rx="1" opacity="0.6"/>
  <rect x="25" y="40" width="120" height="6" fill="#D4C9B0" rx="1" opacity="0.4"/>
  <rect x="25" y="52" width="140" height="6" fill="#D4C9B0" rx="1" opacity="0.4"/>
  <rect x="25" y="64" width="100" height="6" fill="#D4C9B0" rx="1" opacity="0.4"/>
  
  <!-- Skeleton image placeholder with Art Nouveau vignette -->
  <rect x="25" y="78" width="60" height="24" fill="#D4C9B0" rx="1" opacity="0.5"/>
  <ellipse cx="55" cy="90" rx="20" ry="8" fill="none" stroke="#AE8746" stroke-width="0.5" opacity="0.4"/>
</svg>